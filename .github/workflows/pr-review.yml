name: PR Analyzer Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions: 
  contents: write
  pull-requests: write
  issues: read

jobs:
  analyze-pr:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Analyze PR with Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node run-agent.js "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "${{ github.event.pull_request.number }}"
      
      - name: Upload Analysis Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-results
          path: suggestions/
          retention-days: 30
